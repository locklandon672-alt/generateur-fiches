<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de Fiches Produits IA</title>
<style>
  body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
  h1 { color: #2c3e50; text-align: center; }
  input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
  button { width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
  #result { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>🛍️ Générateur de Fiches Produits</h1>
<input type="text" id="produit" placeholder="Nom du produit (ex: Montre LED)" />
<input type="text" id="prix" placeholder="Prix (ex: 25 000 Ar)" />
<select id="categorie">
  <option value="mode">Mode & Vêtements</option>
  <option value="tech">Tech & Gadgets</option>
  <option value="beaute">Beauté & Soin</option>
  <option value="maison">Maison & Déco</option>
</select>
<textarea id="details" placeholder="Détails du produit (couleurs, taille, matière...)" rows="3"></textarea>
<button onclick="generer()">✨ Générer la fiche produit</button>
<div id="result"></div>

<script>
async function generer() {
  const produit = document.getElementById('produit').value;
  const prix = document.getElementById('prix').value;
  const categorie = document.getElementById('categorie').value;
  const details = document.getElementById('details').value;
  
  if (!produit) { alert('Entre le nom du produit !'); return; }
  
  document.getElementById('result').innerText = '⏳ Génération en cours...';
  
  const prompt = `Crée une fiche produit vendeuse en français pour un étudiant qui fait du dropshipping à Madagascar. Produit: ${produit}, Prix: ${prix}, Catégorie: ${categorie}, Détails: ${details}. Inclus: titre accrocheur, description courte, 3 avantages, et un call-to-action.`;
  
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  
  const data = await response.json();
  document.getElementById('result').innerText = data.content[0].text;
}
</script>
</body>
</html>
