<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FicheIA - Générateur de Fiches Produits</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
  .container { max-width: 580px; margin: 0 auto; }
  .header { text-align: center; padding: 40px 0 30px; }
  .header h1 { color: white; font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  .header p { color: rgba(255,255,255,0.85); font-size: 16px; }
  .badge { display: inline-block; background: rgba(255,255,255,0.2); color: white; padding: 4px 12px; border-radius: 20px; font-size: 13px; margin-bottom: 15px; }
  .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, textarea, select { width: 100%; padding: 12px 16px; border: 2px solid #eee; border-radius: 12px; font-size: 15px; color: #333; transition: border 0.3s; outline: none; background: #fafafa; }
  input:focus, textarea:focus, select:focus { border-color: #667eea; background: white; }
  textarea { resize: none; }
  button { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 5px; letter-spacing: 0.5px; transition: opacity 0.3s; }
  button:active { opacity: 0.85; }
  .result-box { margin-top: 25px; background: linear-gradient(135deg, #f8f9ff, #f0f4ff); border: 2px solid #e0e8ff; border-radius: 16px; padding: 20px; display: none; }
  .result-box h3 { color: #667eea; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .result-text { color: #333; font-size: 15px; line-height: 1.7; white-space: pre-wrap; }
  .copy-btn { margin-top: 15px; width: 100%; padding: 10px; background: white; color: #667eea; border: 2px solid #667eea; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .loading { text-align: center; color: #667eea; font-weight: 600; padding: 20px; display: none; }
  .footer { text-align: center; color: rgba(255,255,255,0.7); font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">⚡ Propulsé par l'IA</div>
    <h1>🛍️ FicheIA</h1>
    <p>Génère des fiches produits vendeuses en quelques secondes</p>
  </div>

  <div class="card">
    <div class="form-group">
      <label>Nom du produit</label>
      <input type="text" id="produit" placeholder="Ex: Montre LED tactile" />
    </div>
    <div class="form-group">
      <label>Prix</label>
      <input type="text" id="prix" placeholder="Ex: 35 000 Ar" />
    </div>
    <div class="form-group">
      <label>Catégorie</label>
      <select id="categorie">
        <option value="mode">👗 Mode & Vêtements</option>
        <option value="tech">📱 Tech & Gadgets</option>
        <option value="beaute">💄 Beauté & Soin</option>
        <option value="maison">🏠 Maison & Déco</option>
      </select>
    </div>
    <div class="form-group">
      <label>Détails du produit</label>
      <textarea id="details" placeholder="Couleurs, taille, matière, caractéristiques..." rows="3"></textarea>
    </div>
    <button onclick="generer()">✨ Générer la fiche produit</button>

    <div class="loading" id="loading">⏳ L'IA génère votre fiche...</div>

    <div class="result-box" id="resultBox">
      <h3>✅ Fiche générée</h3>
      <div class="result-text" id="result"></div>
      <button class="copy-btn" onclick="copier()">📋 Copier la fiche</button>
    </div>
  </div>

  <div class="footer">FicheIA © 2025 — Fait pour les entrepreneurs malgaches 🇲🇬</div>
</div>

<script>
const API_KEY = "AIzaSyDw8kiz3DyLf0rwhYrEZ-op861ggD92EWw";

async function generer() {
  const produit = document.getElementById('produit').value;
  const prix = document.getElementById('prix').value;
  const categorie = document.getElementById('categorie').value;
  const details = document.getElementById('details').value;
  if (!produit) { alert('Entre le nom du produit !'); return; }
  document.getElementById('loading').style.display = 'block';
  document.getElementById('resultBox').style.display = 'none';
  const prompt = `Fiche produit courte en français. Produit: ${produit}, Prix: ${prix}, Catégorie: ${categorie}, Détails: ${details}. Maximum 80 mots. Format: titre accrocheur, 2 avantages, call-to-action.`;
  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { maxOutputTokens: 150 }
    })
  });
  const data = await response.json();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').innerText = data.candidates[0].content.parts[0].text;
  document.getElementById('resultBox').style.display = 'block';
}

function copier() {
  const texte = document.getElementById('result').innerText;
  navigator.clipboard.writeText(texte);
  alert('✅ Fiche copiée !');
}
</script>
</body>
</html>
