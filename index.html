<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExposéIA - Générateur d'exposés</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
  .container{max-width:600px;margin:0 auto}
  .header{text-align:center;padding:30px 0 20px}
  .header h1{color:white;font-size:28px;font-weight:800}
  .header p{color:rgba(255,255,255,0.85);font-size:15px;margin-top:8px}
  .card{background:white;border-radius:20px;padding:25px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
  label{display:block;font-size:12px;font-weight:700;color:#888;margin-bottom:5px;text-transform:uppercase}
  .form-group{margin-bottom:15px}
  input,select{width:100%;padding:12px;border:2px solid #eee;border-radius:10px;font-size:15px;color:#333;outline:none;background:#fafafa}
  input:focus,select:focus{border-color:#667eea;background:white}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn{width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin-top:5px}
  .btn:disabled{opacity:0.6}
  .progress{margin-top:20px;display:none}
  .progress-bar{background:#eee;border-radius:10px;height:8px;margin-bottom:8px}
  .progress-fill{background:linear-gradient(135deg,#667eea,#764ba2);height:8px;border-radius:10px;transition:width 0.5s;width:0%}
  .progress-text{color:#667eea;font-size:13px;font-weight:600;text-align:center}
  .result-box{margin-top:20px;display:none}
  .section{background:#f8f9ff;border:2px solid #e0e8ff;border-radius:16px;padding:20px;margin-bottom:15px}
  .section-title{color:#667eea;font-size:14px;font-weight:800;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .section-content{color:#333;font-size:15px;line-height:1.8;white-space:pre-wrap}
  .copy-btn{width:100%;padding:12px;background:white;color:#667eea;border:2px solid #667eea;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:5px}
  .error{color:#e74c3c;font-weight:600;text-align:center;padding:15px;display:none}
  .footer{text-align:center;color:rgba(255,255,255,0.7);font-size:13px;padding:20px 0}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📝 ExposéIA</h1>
    <p>Génère un exposé complet en quelques secondes ⚡</p>
  </div>
  <div class="card">
    <div class="form-group">
      <label>Sujet de l'exposé *</label>
      <input type="text" id="sujet" placeholder="Ex: Le changement climatique"/>
    </div>
    <div class="row">
      <div class="form-group">
        <label>Niveau</label>
        <select id="niveau">
          <option value="collège">🏫 Collège</option>
          <option value="lycée" selected>🎓 Lycée</option>
          <option value="université">🏛️ Université</option>
        </select>
      </div>
      <div class="form-group">
        <label>Langue</label>
        <select id="langue">
          <option value="français">🇫🇷 Français</option>
          <option value="malgache">🇲🇬 Malgache</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Nombre de parties</label>
      <select id="parties">
        <option value="2">2 parties</option>
        <option value="3" selected>3 parties</option>
        <option value="4">4 parties</option>
      </select>
    </div>
    <button class="btn" id="btn" onclick="generer()">✨ Générer l'exposé</button>
    <div class="error" id="error">❌ Erreur. Vérifie ta clé API et ta connexion.</div>
    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
      <div class="progress-text" id="progressText">Génération en cours...</div>
    </div>
    <div class="result-box" id="resultBox">
      <div class="section">
        <div class="section-title">📌 Introduction</div>
        <div class="section-content" id="intro"></div>
      </div>
      <div id="partiesBox"></div>
      <div class="section">
        <div class="section-title">✅ Conclusion</div>
        <div class="section-content" id="conclusion"></div>
      </div>
      <div class="section">
        <div class="section-title">📚 Bibliographie</div>
        <div class="section-content" id="biblio"></div>
      </div>
      <button class="copy-btn" onclick="copier()">📋 Copier tout l'exposé</button>
    </div>
  </div>
  <div class="footer">ExposéIA 🇲🇬 — Pour les étudiants malgaches</div>
</div>

<script>
const API_KEY = "AIzaSyAtBGfGPO5Lw3zvMtwsYTYo1qXU6vMnRrI";

async function gemini(prompt) {
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      contents: [{parts: [{text: prompt}]}],
      generationConfig: {maxOutputTokens: 400, temperature: 0.7}
    })
  });
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

function setProgress(pct, text) {
  document.getElementById('fill').style.width = pct + '%';
  document.getElementById('progressText').innerText = text;
}

async function generer() {
  const sujet = document.getElementById('sujet').value.trim();
  if (!sujet) { alert('Entre le sujet !'); return; }
  const niveau = document.getElementById('niveau').value;
  const langue = document.getElementById('langue').value;
  const nbParties = parseInt(document.getElementById('parties').value);
  const btn = document.getElementById('btn');

  btn.disabled = true;
  btn.innerText = '⏳ Génération...';
  document.getElementById('error').style.display = 'none';
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('progress').style.display = 'block';
  document.getElementById('partiesBox').innerHTML = '';

  try {
    const ctx = `Niveau: ${niveau}. Langue: ${langue}. Sujet: ${sujet}.`;

    setProgress(10, '📌 Introduction...');
    const intro = await gemini(`${ctx} Écris une introduction d'exposé en ${langue}, 3-4 phrases, niveau ${niveau}.`);
    document.getElementById('intro').innerText = intro;

    const partiesHTML = [];
    for (let i = 1; i <= nbParties; i++) {
      setProgress(10 + (i * 60 / nbParties), `📖 Partie ${i}/${nbParties}...`);
      const partie = await gemini(`${ctx} Écris la partie ${i} sur ${nbParties} d'un exposé en ${langue}, niveau ${niveau}. 4-5 phrases avec un titre et du contenu.`);
      partiesHTML.push(`<div class="section"><div class="section-title">📖 Partie ${i}</div><div class="section-content">${partie}</div></div>`);
    }
    document.getElementById('partiesBox').innerHTML = partiesHTML.join('');

    setProgress(80, '✅ Conclusion...');
    const conclusion = await gemini(`${ctx} Écris une conclusion d'exposé en ${langue}, niveau ${niveau}. 3-4 phrases.`);
    document.getElementById('conclusion').innerText = conclusion;

    setProgress(95, '📚 Bibliographie...');
    const biblio = await gemini(`${ctx} Génère une bibliographie fictive mais réaliste en ${langue} avec 4 sources pour un exposé sur ${sujet}.`);
    document.getElementById('biblio').innerText = biblio;

    setProgress(100, '✅ Exposé terminé !');
    document.getElementById('resultBox').style.display = 'block';

  } catch(e) {
    document.getElementById('error').style.display = 'block';
  }

  btn.disabled = false;
  btn.innerText = '✨ Générer l\'exposé';
}

function copier() {
  const intro = document.getElementById('intro').innerText;
  const parties = [...document.querySelectorAll('#partiesBox .section-content')].map(e => e.innerText).join('\n\n');
  const conclusion = document.getElementById('conclusion').innerText;
  const biblio = document.getElementById('biblio').innerText;
  const texte = `INTRODUCTION\n\n${intro}\n\nDÉVELOPPEMENT\n\n${parties}\n\nCONCLUSION\n\n${conclusion}\n\nBIBLIOGRAPHIE\n\n${biblio}`;
  navigator.clipboard.writeText(texte);
  alert('✅ Exposé copié !');
}
</script>
</body>
</html>
